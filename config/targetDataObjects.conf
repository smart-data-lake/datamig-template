dataObjects {
  tgt_country {
    type = JdbcTableDataObject
    connectionId = conn_source_db
    table {
      name = ${tgt.table.prefix}"country"
      primaryKey = [iso_3166_1]
    }
  }
  tgt_region {
    type = JdbcTableDataObject
    connectionId = conn_source_db
    table {
      name = ${tgt.table.prefix}"region"
      primaryKey = [iso_3166_1,iso_3166_2]
    }
  }
}
